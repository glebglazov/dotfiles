	url = "https://github.com/jdx/mise/releases/download/v{{ $mise_version }}/mise-v{{ $mise_version }}-linux-x64.tar.gz"
	{{- $mise_checksum = "c19ba5e2f1ffe562655f0c1426b6844e45fe56daf6b796e11d8dca3e070a0698" }}
	{{- end }}
	checksum.sha256="{{ $mise_checksum }}"
	path = "mise/bin/mise"
	executable = true

