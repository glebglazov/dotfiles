includes = ["~/private/.config/pop/config.toml"]

projects = [
    { path = "~/.local/share/chezmoi" },
    { path = "~/Dev/*/*" }
]

[[commands]]
key = "ctrl+o"
label = "dev o"
command = "$SHELL -ic 'dev o'"
exit = true

# [select]
# attention_notifications_enabled = false
#
# [worktree]
# attention_notifications_enabled = false

[dashboard]
# current_pane_always_under_cursor = true
sort_criteria = ["status", "pane_last_visit_at"]

[pane_monitoring]
ignore_status_from = ["tmux-global"]

[[worktree.commands]]
key = "ctrl+l"
label = "cleanup"
command = "tmux-branch-cleanup"
exit = true

[[worktree.commands]]
key = "ctrl+a"
label = "new"
command = "tmux-create-worktree"
exit = true
